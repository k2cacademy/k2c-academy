name: Supabase Keepalive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase function
        run: |
          curl -sS --fail "https://soxhfliflthmggwzknej.supabase.co/functions/v1/quick-responder" \
            -H "x-keepalive-secret: ${{ secrets.KEEPALIVE_SECRET }}"
